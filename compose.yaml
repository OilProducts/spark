services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - HOME=/codex-runtime
      - CODEX_HOME=/codex-runtime/.codex
      - XDG_CONFIG_HOME=/codex-runtime/.config
      - XDG_DATA_HOME=/codex-runtime/.local/share
      - ATTRACTOR_RUNTIME_REPO_ROOT=/app
      - ATTRACTOR_HOST_REPO_ROOT=${PWD}
      - ATTRACTOR_CODEX_RUNTIME_ROOT=/codex-runtime
      - ATTRACTOR_CODEX_SEED_DIR=/codex-seed
      - OPENAI_API_KEY
      - OPENAI_ORG
      - OPENAI_PROJECT
    command: uvicorn attractor.api.server:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - codex_runtime:/codex-runtime
      - ${HOME}/.codex/auth.json:/codex-seed/auth.json:ro
      - ${HOME}/.codex/config.toml:/codex-seed/config.toml:ro
      - ${HOME}/.codex/skills:/codex-runtime/.codex/skills:ro
      - ${HOME}/projects/agent-skills:/Users/chris/projects/agent-skills:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
      - CHOKIDAR_USEPOLLING=1
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend

volumes:
  frontend_node_modules:
  codex_runtime:
