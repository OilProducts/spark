services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SPARK_HOME=/spark
      - SPARK_PROJECT_ROOTS=/projects
      - ATTRACTOR_CODEX_RUNTIME_ROOT=/codex-runtime
      - HOME=/codex-runtime
      - CODEX_HOME=/codex-runtime/.codex
      - XDG_CONFIG_HOME=/codex-runtime/.config
      - XDG_DATA_HOME=/codex-runtime/.local/share
      - OPENAI_API_KEY
      - OPENAI_BASE_URL
      - OPENAI_ORG_ID
      - OPENAI_PROJECT_ID
      - OPENAI_COMPATIBLE_BASE_URL
      - OPENAI_COMPATIBLE_API_KEY
      - ANTHROPIC_API_KEY
      - ANTHROPIC_BASE_URL
      - GEMINI_API_KEY
      - GEMINI_BASE_URL
      - GOOGLE_API_KEY
      - OPENROUTER_API_KEY
      - OPENROUTER_BASE_URL
      - OPENROUTER_HTTP_REFERER
      - OPENROUTER_TITLE
      - LITELLM_BASE_URL
      - LITELLM_API_KEY
    volumes:
      - codex_runtime:/codex-runtime
      - spark_home:/spark

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
      - CHOKIDAR_USEPOLLING=1
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend

volumes:
  frontend_node_modules:
  codex_runtime:
  spark_home:
