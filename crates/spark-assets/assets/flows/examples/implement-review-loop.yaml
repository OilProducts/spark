schema_version: '1'
id: implement_review_loop
title: Implement And Review Loop
description: Plan a change, implement it, review the result, and loop on failures until the work is ready.
goal: Plan, implement, review, and iterate on a codebase change until it is ready.
inputs:
- key: context.request.summary
  label: Request Summary
  type: string
  description: Short description of the requested change.
  required: true
- key: context.request.target_paths
  label: Target Paths
  type: string[]
  description: Optional files or directories the flow should focus on.
  required: false
- key: context.request.acceptance_criteria
  label: Acceptance Criteria
  type: string[]
  description: Optional criteria the finished work should satisfy.
  required: false
defaults:
  fidelity: summary:high
  llm_provider: codex
  llm_model: gpt-5.6-sol
nodes:
  done:
    kind: exit
    label: Done
    config:
      kind: exit
    execution:
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      error_policy: continue
      goal_gate: false
  implement:
    kind: agent_task
    label: Implement
    config:
      kind: agent_task
      prompt: Make the planned change in the repository and validate that it addresses the stated goal. When present, honor
        context.request.summary, context.request.target_paths, and context.request.acceptance_criteria. If the carryover context
        includes review feedback or required changes, address them directly in this pass.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      error_policy: continue
      goal_gate: false
    contracts:
      reads_context:
      - context.request.summary
      - context.request.target_paths
      - context.request.acceptance_criteria
      - context.review.summary
      - context.review.required_changes
      - context.review.blockers
  plan:
    kind: agent_task
    label: Plan
    config:
      kind: agent_task
      prompt: Inspect the repository and produce a concrete implementation plan for the stated goal. When present, use context.request.summary,
        context.request.target_paths, and context.request.acceptance_criteria to scope the plan. If the carryover context
        includes prior implementation failure or review feedback, use it to refine the next attempt instead of restating the
        goal.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      error_policy: continue
      goal_gate: false
    contracts:
      reads_context:
      - context.request.summary
      - context.request.target_paths
      - context.request.acceptance_criteria
      - context.review.summary
      - context.review.required_changes
      - context.review.blockers
  review:
    kind: agent_task
    label: Review
    config:
      kind: agent_task
      prompt: Review the implementation for correctness, validation coverage, and remaining issues. When present, judge it
        against context.request.summary, context.request.target_paths, and context.request.acceptance_criteria. Respond with
        ONLY a JSON status envelope. Return outcome success only when the change is ready. Otherwise return outcome fail with
        failure_reason and context_updates for context.review.summary, context.review.required_changes, and context.review.blockers.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      error_policy: continue
      goal_gate: false
    contracts:
      response: status_envelope
      reads_context:
      - context.request.summary
      - context.request.target_paths
      - context.request.acceptance_criteria
      writes_context:
      - context.review.summary
      - context.review.required_changes
      - context.review.blockers
  start:
    kind: start
    label: Start
    config:
      kind: start
    execution:
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      error_policy: continue
      goal_gate: false
edges:
- from: implement
  to: plan
  label: Replan
  condition: outcome=fail
  extensions:
    loop_restart: false
- from: implement
  to: review
  label: Review
  condition: outcome=success
  extensions:
    loop_restart: false
- from: plan
  to: implement
  extensions:
    loop_restart: false
- from: review
  to: done
  label: Ready
  condition: outcome=success
  extensions:
    loop_restart: false
- from: review
  to: implement
  label: Fix
  condition: outcome=fail
  extensions:
    loop_restart: false
- from: start
  to: plan
  extensions:
    loop_restart: false
