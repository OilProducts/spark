schema_version: '1'
id: implementation_worker
title: Implementation Worker
description: A reusable child workflow that makes a codebase change, reviews the result, and loops until it is ready.
goal: Attempt a repository change, review it, and keep iterating until the result is ready or the attempt fails.
inputs:
- key: context.request.summary
  label: Request Summary
  type: string
  description: Short description of the requested change.
  required: true
- key: context.request.target_paths
  label: Target Paths
  type: string[]
  description: Optional files or directories the flow should focus on.
  required: false
- key: context.request.acceptance_criteria
  label: Acceptance Criteria
  type: string[]
  description: Optional criteria the finished work should satisfy.
  required: false
defaults:
  fidelity: summary:high
  llm_provider: codex
  llm_model: gpt-5.6-sol
nodes:
  done:
    kind: exit
    label: Done
    config:
      kind: exit
    execution:
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      error_policy: continue
      goal_gate: false
  implement:
    kind: agent_task
    label: Implement
    config:
      kind: agent_task
      prompt: Attempt the repository change needed to satisfy the stated goal, then validate the result before handing it
        off for review. When present, honor context.request.summary, context.request.target_paths, and context.request.acceptance_criteria.
        If the carryover context includes review feedback or required changes, address them directly in this pass.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      error_policy: continue
      goal_gate: false
    contracts:
      reads_context:
      - context.request.summary
      - context.request.target_paths
      - context.request.acceptance_criteria
      - context.review.summary
      - context.review.required_changes
      - context.review.blockers
  review:
    kind: agent_task
    label: Review
    config:
      kind: agent_task
      prompt: Review the implementation for correctness, validation coverage, and remaining issues. When present, judge it
        against context.request.summary, context.request.target_paths, and context.request.acceptance_criteria. Respond with
        ONLY a JSON status envelope. Return outcome success only when the change is ready. Otherwise return outcome fail with
        failure_reason and context_updates for context.review.summary, context.review.required_changes, and context.review.blockers.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      error_policy: continue
      goal_gate: false
    contracts:
      response: status_envelope
      reads_context:
      - context.request.summary
      - context.request.target_paths
      - context.request.acceptance_criteria
      writes_context:
      - context.review.summary
      - context.review.required_changes
      - context.review.blockers
  start:
    kind: start
    label: Start
    config:
      kind: start
    execution:
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      error_policy: continue
      goal_gate: false
edges:
- from: implement
  to: review
  label: Review
  condition: outcome=success
  extensions:
    loop_restart: false
- from: review
  to: done
  label: Ready
  condition: outcome=success
  extensions:
    loop_restart: false
- from: review
  to: implement
  label: Fix
  condition: outcome=fail
  extensions:
    loop_restart: false
- from: start
  to: implement
  extensions:
    loop_restart: false
