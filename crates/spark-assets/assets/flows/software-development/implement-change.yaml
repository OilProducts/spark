schema_version: '1'
id: implement_change
title: Implement Change
description: Plan, implement, review, validate, and commit one bounded repository change in an isolated worktree.
goal: Plan, implement, review, validate, and commit one bounded repository change in an isolated worktree.
inputs:
- key: context.request.objective
  label: Objective
  type: string
  description: Inline task objective. Provide this or artifact_path.
  required: false
- key: context.request.artifact_path
  label: Artifact Path
  type: string
  description: Repository-relative task artifact. Provide this or objective.
  required: false
- key: context.request.target_paths
  label: Target Paths
  type: string[]
  required: false
- key: context.request.constraints
  label: Constraints
  type: string[]
  required: false
- key: context.request.acceptance_criteria
  label: Acceptance Criteria
  type: string[]
  required: false
- key: context.request.validation_command
  label: Validation Command
  type: string
  required: false
- key: context.request.base_ref
  label: Base Ref
  type: string
  required: false
- key: context.request.git_result
  label: Git Result Settings
  type: object
  required: false
defaults:
  fidelity: summary:high
  llm_provider: codex
  llm_model: gpt-5.6-sol
metadata:
  software_development:
    launcher: true
    workspace_policy: isolated_branch
    run_registry: .spark/software-development/runs
nodes:
  start:
    kind: start
    label: Start
    config:
      kind: start
  implement:
    kind: subflow
    label: Implement
    config:
      kind: subflow
      flow_ref: workers/implement-task.yaml
  done:
    kind: exit
    label: Done
    config:
      kind: exit
edges:
- from: start
  to: implement
- from: implement
  to: done
  condition: outcome=success
