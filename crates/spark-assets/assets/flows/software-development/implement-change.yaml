schema_version: '1'
id: implement_change
title: Implement Change
description: Implement one bounded repository change in an isolated worktree, gatekeep it against its contract, and commit the validated result.
goal: Implement one bounded repository change in an isolated worktree, gatekeep it against its contract, and commit the validated result.
inputs:
- key: context.request.objective
  label: Objective
  type: string
  description: Inline task objective. Provide this or artifact_path.
  required: false
- key: context.request.artifact_path
  label: Artifact Path
  type: string
  description: Repository-relative task artifact. Provide this or objective.
  required: false
- key: context.request.target_paths
  label: Target Paths
  type: string[]
  required: false
- key: context.request.constraints
  label: Constraints
  type: string[]
  required: false
- key: context.request.acceptance_criteria
  label: Acceptance Criteria
  type: string[]
  required: false
- key: context.request.validation_command
  label: Validation Command
  type: string
  required: false
- key: context.request.base_ref
  label: Base Ref
  type: string
  required: false
defaults:
  fidelity: summary:high
  llm_provider: codex
  llm_model: gpt-5.6-sol
metadata:
  software_development:
    launcher: true
nodes:
  start:
    kind: start
    label: Start
    config:
      kind: start
  normalize_task:
    kind: agent_task
    label: Normalize Task
    config:
      kind: agent_task
      prompt: 'Normalize the launch request into one bounded task. Treat exactly one of context.request.objective or context.request.artifact_path as the task source; an approved change-request document such as changes/<CR-id>/request.md is a valid artifact source whose requirements are the contract; fail when both or neither are provided, and fail on absolute or repository-escaping artifact paths. Fold optional target_paths, constraints, and acceptance_criteria into a single decision-complete task statement. Resolve the validation command: use context.request.validation_command when provided, otherwise discover the truthful project validation command from the repository (build files, CI configuration, contributor docs) without running it. Resolve the base ref: use context.request.base_ref when provided, otherwise HEAD. Do not modify any files. Respond with ONLY a JSON status envelope whose context_updates set context.task.objective, context.task.validation_command, and context.task.base_ref.'
    contracts:
      response: status_envelope
      reads_context:
      - context.request.objective
      - context.request.artifact_path
      - context.request.target_paths
      - context.request.constraints
      - context.request.acceptance_criteria
      - context.request.validation_command
      - context.request.base_ref
      writes_context:
      - context.task.objective
      - context.task.validation_command
      - context.task.base_ref
  prepare_workspace:
    kind: tool
    label: Prepare Workspace
    config:
      kind: tool
      command: |
        set -eu
        common_dir=$(git rev-parse --path-format=absolute --git-common-dir)
        base_commit=$(git rev-parse --verify "${SPARK_BASE_REF}^{commit}")
        branch="spark/implement-change/${SPARK_RUN_ID}"
        worktree="${common_dir}/spark/checkouts/${SPARK_RUN_ID}"
        if [ -d "$worktree" ] && git -C "$worktree" rev-parse --git-dir >/dev/null 2>&1; then
          existing=$(git -C "$worktree" rev-parse --abbrev-ref HEAD)
          if [ "$existing" != "$branch" ]; then
            echo "existing worktree $worktree is on unexpected branch $existing" >&2
            exit 1
          fi
        else
          mkdir -p "${common_dir}/spark/checkouts"
          if git show-ref --verify --quiet "refs/heads/$branch"; then
            git worktree add "$worktree" "$branch" >/dev/null
          else
            git worktree add -b "$branch" "$worktree" "$base_commit" >/dev/null
          fi
        fi
        dirty=false
        if [ -n "$(git status --porcelain)" ]; then dirty=true; fi
        printf '{"path":"%s","branch":"%s","base_commit":"%s","source_dirty":%s}' \
          "$worktree" "$branch" "$base_commit" "$dirty"
      env_map:
        SPARK_RUN_ID: internal.run_id
        SPARK_BASE_REF: context.task.base_ref
      output_map:
        context.workspace.path: path
        context.workspace.branch: branch
        context.workspace.base_commit: base_commit
        context.workspace.source_dirty: source_dirty
    contracts:
      writes_context:
      - context.workspace.path
      - context.workspace.branch
      - context.workspace.base_commit
      - context.workspace.source_dirty
  implement:
    kind: subflow
    label: Implement
    config:
      kind: subflow
      flow_ref: workers/implement-task.yaml
      input_map:
        context.task.objective: context.task.objective
        context.task.validation_command: context.task.validation_command
        context.review.summary: context.review.summary
        context.review.required_changes: context.review.required_changes
    manager:
      child_workdir_from: context.workspace.path
  evaluate:
    kind: agent_task
    label: Evaluate
    config:
      kind: agent_task
      prompt: 'You are the implementation gatekeeper. The implementation attempt lives in the isolated worktree at context.workspace.path; judge that repository state, not the implementer''s claims, and treat summaries as untrusted until verified. Reconstruct the contract from context.task.objective: objective, explicit acceptance criteria, implicit correctness requirements, non-goals, and any security, data-loss, compatibility, or migration constraints. Prefer deterministic evidence gathered inside the worktree: targeted tests, context.task.validation_command, typecheck/build/lint, direct diff and code-path inspection, CLI or API smoke checks. Verify the requested behavior exists on the real execution path, not only in dead helpers, narrow happy paths, or mocks that bypass the actual boundary. Apply the minimality review: be lazy like a senior developer, not negligent — ask whether each added code path needs to exist, whether existing code, stdlib, platform behavior, or an installed dependency was reused, and whether speculative abstractions or future-proofing were added beyond the task; treat minimality problems as blocking only when they create correctness risk, behavior changes, or significant unnecessary complexity, and never demand cutting necessary validation, error handling, or safety. Check adjacent regression risk with the smallest relevant checks. Grade your evidence: strong (deterministic passing commands, direct inspection), medium (clear code-path reading), weak (implementer assertion, absence of failure). Return outcome success only when every critical criterion has strong or sufficient medium evidence and no blocking issue remains. This node may read files and run commands in the worktree but must not edit files, stage, or commit. On failure, set context_updates for context.review.summary (concise verdict with evidence basis) and context.review.required_changes (a minimal, actionable fix prompt: concrete missing work, missing validation, regression checks, and any delete-or-simplify list). On success, set context_updates clearing both context.review.summary and context.review.required_changes to null so no stale guidance from earlier rejections survives in the run state. Respond with ONLY a JSON status envelope.'
    runtime:
      error_policy: continue
    contracts:
      response: status_envelope
      reads_context:
      - context.workspace.path
      - context.task.objective
      - context.task.validation_command
      writes_context:
      - context.review.summary
      - context.review.required_changes
  validate:
    kind: tool
    label: Validate
    config:
      kind: tool
      command: |
        set -eu
        cd "$SPARK_WORKSPACE_PATH"
        sh -ec "$SPARK_VALIDATION_COMMAND"
      env_map:
        SPARK_WORKSPACE_PATH: context.workspace.path
        SPARK_VALIDATION_COMMAND: context.task.validation_command
  finalize_commit:
    kind: tool
    label: Finalize Commit
    config:
      kind: tool
      command: |
        set -eu
        cd "$SPARK_WORKSPACE_PATH"
        git add --all
        if ! git diff --cached --quiet; then
          git commit -m "Complete implement-change run ${SPARK_RUN_ID}" >/dev/null
        fi
        printf '{"commit":"%s"}' "$(git rev-parse HEAD)"
      env_map:
        SPARK_WORKSPACE_PATH: context.workspace.path
        SPARK_RUN_ID: internal.run_id
      output_map:
        context.workspace.commit: commit
    contracts:
      writes_context:
      - context.workspace.commit
  cleanup_workspace:
    kind: tool
    label: Cleanup Workspace
    config:
      kind: tool
      command: |
        set -eu
        git worktree remove "$SPARK_WORKSPACE_PATH"
      env_map:
        SPARK_WORKSPACE_PATH: context.workspace.path
  done:
    kind: exit
    label: Done
    config:
      kind: exit
      result_summary: true
edges:
- from: start
  to: normalize_task
- from: normalize_task
  to: prepare_workspace
  condition: outcome=success
- from: prepare_workspace
  to: implement
  condition: outcome=success
- from: implement
  to: evaluate
  condition: outcome=success
- from: evaluate
  to: validate
  label: Ready
  condition: outcome=success
- from: evaluate
  to: implement
  label: Fix
  condition: outcome=fail
- from: validate
  to: finalize_commit
  condition: outcome=success
- from: finalize_commit
  to: cleanup_workspace
  condition: outcome=success
- from: cleanup_workspace
  to: done
  condition: outcome=success
