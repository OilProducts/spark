schema_version: '1'
id: explore_codebase
title: Explore Codebase
description: Inspect a repository without editing and produce an evidence-backed architecture and execution-path map.
goal: Inspect a repository without editing and produce an evidence-backed architecture and execution-path map.
inputs:
- key: context.request.objective
  label: Objective
  type: string
  description: Inline task objective. Provide this or artifact_path.
  required: false
- key: context.request.artifact_path
  label: Artifact Path
  type: string
  description: Repository-relative task artifact. Provide this or objective.
  required: false
- key: context.request.target_paths
  label: Target Paths
  type: string[]
  required: false
- key: context.request.constraints
  label: Constraints
  type: string[]
  required: false
- key: context.request.acceptance_criteria
  label: Acceptance Criteria
  type: string[]
  required: false
- key: context.request.validation_command
  label: Validation Command
  type: string
  required: false
- key: context.request.base_ref
  label: Base Ref
  type: string
  required: false
defaults:
  fidelity: summary:high
  llm_provider: codex
  llm_model: gpt-5.6-sol
metadata:
  software_development:
    launcher: true
nodes:
  start:
    kind: start
    label: Start
    config:
      kind: start
  execute:
    kind: agent_task
    label: Execute
    config:
      kind: agent_task
      prompt: 'Normalize the task, inspect the current checkout without changing any files, trace relevant architecture, execution paths, conventions, and tests, and report a durable exploration summary. Treat exactly one of context.request.objective or context.request.artifact_path as the task source; reject both or neither, and reject absolute or repository-escaping artifact paths. Incorporate optional target_paths, constraints, acceptance_criteria, validation_command, and base_ref. Never edit repository files, create branches or worktrees, or commit. Deliver the full result in your response and respond with ONLY a JSON status envelope.'
    contracts:
      response: status_envelope
      reads_context:
      - context.request.objective
      - context.request.artifact_path
      - context.request.target_paths
      - context.request.constraints
      - context.request.acceptance_criteria
      - context.request.validation_command
      - context.request.base_ref
  done:
    kind: exit
    label: Done
    config:
      kind: exit
edges:
- from: start
  to: execute
- from: execute
  to: done
  condition: outcome=success
