schema_version: '1'
id: software_development_update_dependencies_task
title: Update Dependencies Task
description: Hidden reusable software-development worker.
goal: Update the selected dependencies coherently inside the current isolated worktree.
defaults:
  fidelity: summary:high
  llm_provider: codex
  llm_model: gpt-5.6-sol
metadata:
  software_development:
    launcher: false
    worker: true
nodes:
  start:
    kind: start
    config:
      kind: start
  work:
    kind: agent_task
    config:
      kind: agent_task
      prompt: 'The current working directory is an isolated git worktree on a dedicated branch. Read the dependency selection and constraints from context.task.objective, update manifests and lockfiles coherently, and inspect compatibility and security implications with focused test evidence; context.task.validation_command names the project validation gate. Do not commit, push, create branches or worktrees, or clean anything up; the parent flow validates, commits, and releases the workspace. Respond with ONLY a JSON status envelope.'
    contracts:
      response: status_envelope
      reads_context:
      - context.task.objective
      - context.task.validation_command
  done:
    kind: exit
    config:
      kind: exit
edges:
- from: start
  to: work
- from: work
  to: done
  condition: outcome=success
