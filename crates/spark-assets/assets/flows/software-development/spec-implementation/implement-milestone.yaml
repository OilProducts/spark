schema_version: '1'
id: implement_milestone
title: Implement Milestone
metadata:
  software_development:
    launcher: false
    worker: true
description: A child milestone worker for the software-development spec implementation program. The committed spec package
  lives under specs/<slug>/ and is surfaced to this flow through the stable .spark/spec-implementation/current/spec/ symlink.
  It keeps the authoritative live active-item binding in protected context.item.* keys and the durable child queue ledger
  under .spark/spec-implementation/current/milestones/<id>/state.json while shared runtime binding files and validation artifacts
  under .spark/spec-implementation/current/ remain runtime control data rather than the active item-control plane.
goal: Implement the bound current milestone from the active software-development runtime alias exposed at .spark/spec-implementation/current/current-milestone.json
  by decomposing it into bounded items, implementing them, validating the repository, and recording a milestone result.
defaults:
  fidelity: summary:high
  llm_provider: codex
  llm_model: gpt-5.6-sol
  reasoning_effort: high
nodes:
  assess_validation:
    kind: agent_task
    label: Assess Validation
    config:
      kind: agent_task
      prompt: Read .spark/spec-implementation/current/validation-plan.json, .spark/spec-implementation/current/validation.stdout.txt,
        and .spark/spec-implementation/current/validation.stderr.txt. Also inspect context.tool.exit_code. Write .spark/spec-implementation/current/validation-result.json
        as valid JSON with fields item_id, item_title, status, command, exit_code, summary, and suites. Each suite entry must
        include name, status, required, summary, and skip_reason, where status is one of pass, fail, skipped, or blocked.
        Copy item_id and item_title from the current item and require them to match the current item context. Use .spark/spec-implementation/current/validation-plan.json
        as the expected validation scope and suite list. Treat skipped or blocked required suites as non-pass unless the item
        or run context explicitly allows that condition. Exit code 0 should normally map to pass when the captured evidence
        supports it; exit code 2 should be used for blocked validation when a missing prerequisite was identified; other nonzero
        exit codes should map to fail unless the captured evidence clearly shows a blocked external prerequisite. Fail validation
        if a stronger deterministic repo-wide gate was available but omitted, or if a changed documented public surface was
        checked only through helper-level or bypass paths. Respond with ONLY a JSON status envelope. Return outcome success
        only when .spark/spec-implementation/current/validation-result.json is written for the current item and status=pass
        with all required suites passing. If validation is non-pass because more implementation work is needed on the same
        item, return outcome fail with preferred_label Fix and write context.review.summary, context.review.required_changes,
        and context.review.blockers from the validation evidence. If validation is non-pass because the item is wrongly scoped
        or exposed prerequisite repair work that should be rewritten within this milestone, write milestone_dir/rewrite-items.json
        as a JSON array of replacement items using the existing item schema and return outcome fail with preferred_label Rewrite.
        If validation is non-pass only because of a truly external blocker that cannot be resolved within this milestone,
        write .spark/spec-implementation/current/block-reason.md and return outcome fail with preferred_label Blocked.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
      reads_context:
      - context.item.id
      - context.item.title
      - context.item.summary
      - context.tool.exit_code
      writes_context:
      - context.review.summary
      - context.review.required_changes
      - context.review.blockers
  blocked_exit:
    kind: agent_task
    label: Blocked Exit
    config:
      kind: agent_task
      prompt: Read context.milestone.id, context.milestone.title, .spark/spec-implementation/current/spec/source.md, .spark/spec-implementation/current/spec/requirements.json,
        and the current milestone state under .spark/spec-implementation/current/milestones/<context milestone id>/. Treat
        context.milestone.id plus the milestone-local state as the authoritative identity for this worker even if shared runtime
        bindings under .spark/spec-implementation/current/current-milestone.json or state.json.current_milestone_id drifted
        during implementation. Write .spark/spec-implementation/current/milestones/<context milestone id>/result.json with
        fields status, outcome, outcome_reason_code, outcome_reason_message, and summary using status=completed and outcome=failure.
        Also write context.workflow_outcome="failure", context.workflow_outcome_reason_code="blocked", and context.workflow_outcome_reason_message
        to a short summary of what remains blocked and why the milestone could not complete automatically. Respond with ONLY
        a JSON status envelope and return outcome success only after the result file and context updates are written.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
      reads_context:
      - context.milestone.id
      - context.milestone.title
      writes_context:
      - context.workflow_outcome
      - context.workflow_outcome_reason_code
      - context.workflow_outcome_reason_message
  done:
    kind: exit
    label: Done
    config:
      kind: exit
    execution:
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
  extract_items:
    kind: agent_task
    label: Extract Items
    config:
      kind: agent_task
      prompt: 'Read context.milestone.id, context.milestone.title, context.milestone.objective, context.milestone.requirement_ids,
        context.milestone.decision_ids, context.milestone.acceptance_criteria, context.milestone.target_paths, .spark/spec-implementation/current/spec/source.md,
        .spark/spec-implementation/current/spec/requirements.json, .spark/spec-implementation/current/spec/architecture.md,
        and .spark/spec-implementation/current/spec/contract-decisions.json. The architecture file is .spark/spec-implementation/current/spec/architecture.md
        and the decision ledger is .spark/spec-implementation/current/spec/contract-decisions.json. Treat context.milestone.*
        plus milestone_dir/state.json as the authoritative child-worker milestone binding even if shared runtime bindings
        under .spark/spec-implementation/current/current-milestone.json or state.json.current_milestone_id later drift. Treat
        .spark/spec-implementation/current/spec/source.md as the source of product behavior and external contract, .spark/spec-implementation/current/spec/architecture.md
        as the binding implementation contract, and .spark/spec-implementation/current/spec/contract-decisions.json as the
        approved machine-readable resolution set. Do not reread another duplicate copy of the same spec from the repository.
        Read files needed from the current repository. Stay within the current cwd (the repository root). Do not inspect paths
        outside it. Derive milestone_dir as .spark/spec-implementation/current/milestones/<context milestone id>/. Update
        milestone_dir/state.json so it contains an items array of bounded implementable work items for only this milestone.
        Each item must include: id, title, summary, decision_ids, acceptance_criteria, constraints, target_paths, depends_on,
        status, attempts, and notes. Use status=pending and attempts=0 for newly extracted items. Every milestone decision_id
        must appear in at least one item''s decision_ids, and each bound decision must be reflected directly in item acceptance_criteria
        and target_paths rather than buried only in notes. If the spec, architecture, and contract decisions cannot be reconciled
        into a truthful item plan, leave the issue explicit so Validate Item Plan can force re-extraction rather than silently
        choosing one source. Preserve milestone metadata and keep the file valid JSON. Respond with ONLY a JSON status envelope
        and return outcome success only after the milestone state is written.'
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
      reads_context:
      - context.milestone.id
      - context.milestone.title
      - context.milestone.objective
      - context.milestone.requirement_ids
      - context.milestone.decision_ids
      - context.milestone.acceptance_criteria
      - context.milestone.target_paths
  final_milestone_audit:
    kind: agent_task
    label: Final Milestone Audit
    config:
      kind: agent_task
      prompt: Read context.milestone.id, context.milestone.title, context.milestone.objective, context.milestone.requirement_ids,
        context.milestone.decision_ids, .spark/spec-implementation/current/spec/source.md, .spark/spec-implementation/current/spec/requirements.json,
        .spark/spec-implementation/current/spec/architecture.md, .spark/spec-implementation/current/spec/contract-decisions.json,
        the milestone state under .spark/spec-implementation/current/milestones/<context milestone id>/state.json, and the
        current repository state as needed. The decision ledger is .spark/spec-implementation/current/spec/contract-decisions.json.
        Treat context.milestone.* plus milestone-local state as the authoritative milestone identity for this child worker.
        Treat shared runtime binding files under .spark/spec-implementation/current/current-milestone.json and state.json.current_milestone_id
        as bookkeeping that may legitimately drift during implementation rather than as the authoritative child binding after
        dispatch. Treat .spark/spec-implementation/current/spec/source.md as the source of product behavior and external contract,
        .spark/spec-implementation/current/spec/architecture.md as the binding implementation contract, and .spark/spec-implementation/current/spec/contract-decisions.json
        as the approved resolution set. Do not reread another duplicate copy of the same spec from the repository. Stay within
        the current cwd (the repository root). Do not inspect paths outside it. Decide whether this milestone is now complete.
        A milestone is not complete while any decision bound to this milestone remains unmet, even if metadata or validation
        bookkeeping passes. Treat missing deliverability work inside this milestone as remaining implementable work, not premature
        success. If the milestone is complete, respond with ONLY a JSON status envelope with outcome success. If more implementable
        repository work remains inside the same milestone, append new pending items directly into milestone_dir/state.json
        using the existing item schema including decision_ids and return outcome fail with preferred_label Extend. Use Extend
        for remaining packaging, bootstrap, export, validation, repository-hygiene, cohesion cleanup, or unmet public-surface
        decision work that still belongs inside this milestone. Metadata-only repair items are allowed only when all bound
        decision_ids are already satisfied; otherwise append real implementation items for the unmet decision work. If the
        remaining gap is ambiguous, under-specified, blocked on external input, or depends on a material spec-versus-architecture
        conflict that is missing from .spark/spec-implementation/current/spec/contract-decisions.json, leave the milestone
        state valid and return outcome fail with preferred_label Blocked.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
      reads_context:
      - context.milestone.id
      - context.milestone.title
      - context.milestone.objective
      - context.milestone.requirement_ids
      - context.milestone.decision_ids
  gate_item_completion:
    kind: agent_task
    label: Gate Item Completion
    config:
      kind: agent_task
      prompt: Read the current milestone state in .spark/spec-implementation/current/milestones/<current milestone id>/state.json
        and .spark/spec-implementation/current/validation-result.json. Treat context.item.id as the authoritative live binding
        for the active item. Confirm state.json.current_item_id and .spark/spec-implementation/current/validation-result.json.item_id
        both equal context.item.id, that the matching state item exists exactly once and is status=in_progress, and that validation
        status=pass with all required suites passing. Treat missing validation-result.json, stale or mismatched item ids,
        missing active state in the durable ledger, blocked validation, failed validation, skipped required suites, or blocked
        required suites as non-pass. If the live binding and durable ledger disagree, write .spark/spec-implementation/current/block-reason.md
        and return outcome fail with preferred_label Blocked. If queue identity is coherent but validation evidence is missing
        or non-passing for context.item.id, return outcome fail with preferred_label Revalidate and write context.review.summary,
        context.review.required_changes, and context.review.blockers describing what validation evidence is missing or non-passing.
        Respond with ONLY a JSON status envelope. Return outcome success only when the active item has a passing validation
        result and the live binding agrees with the durable ledger.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
      reads_context:
      - context.item.id
      - context.item.title
      writes_context:
      - context.review.summary
      - context.review.required_changes
      - context.review.blockers
  implement_current:
    kind: agent_task
    label: Implement Current Item
    config:
      kind: agent_task
      prompt: Implement the current milestone item described by context.item.summary, context.item.acceptance_criteria, context.item.constraints,
        and context.item.target_paths. Keep the scope bounded to this item only. If review feedback exists in context.review.summary
        or context.review.required_changes, address it directly in this pass before validation. Do not rely on environment-specific
        hacks, test-only bootstrap behavior, or compatibility shims as the primary way the item works. Do not edit milestone_dir/state.json
        or .spark/spec-implementation/current/validation-result.json in this node. Do not claim that a later item is now active,
        complete, or next; queue advancement belongs only to the queue-state nodes. If the cleanest path appears broader than
        the current item, keep the repository coherent so review can request Rewrite instead of cementing a brittle workaround.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      reads_context:
      - context.item.id
      - context.item.title
      - context.item.summary
      - context.item.acceptance_criteria
      - context.item.constraints
      - context.item.target_paths
      - context.item.attempts
      - context.review.summary
      - context.review.required_changes
      - context.review.blockers
  mark_current_blocked:
    kind: agent_task
    label: Mark Current Blocked
    config:
      kind: agent_task
      prompt: Read the current milestone state in .spark/spec-implementation/current/milestones/<current milestone id>/state.json
        and .spark/spec-implementation/current/block-reason.md. Treat context.item.id as the authoritative live binding for
        the item being blocked. Mark only that matching item status as blocked, store a concise reason in its notes field,
        clear current_item_id, preserve the rest of the queue, keep the milestone state valid JSON, and respond with ONLY
        a JSON status envelope. Use context_updates for context.item.id, context.item.title, context.item.summary, context.item.decision_ids,
        context.item.acceptance_criteria, context.item.constraints, context.item.target_paths, context.item.depends_on, context.item.attempts,
        context.review.summary, context.review.required_changes, context.review.blockers, context.validation.item_id, context.validation.status,
        context.validation.summary, missing_prerequisites, validation_message, and validation_exit_code by setting each to
        JSON null so the live binding is removed after the block is recorded. If context.item.id is missing, the matching
        item is absent, or the durable ledger points at a different item, write .spark/spec-implementation/current/block-reason.md
        and return outcome fail with preferred_label Blocked without mutating queue state. Return outcome success only after
        the milestone state is updated and the live active-item binding is cleared.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
      reads_context:
      - context.item.id
      writes_context:
      - context.item.id
      - context.item.title
      - context.item.summary
      - context.item.decision_ids
      - context.item.acceptance_criteria
      - context.item.constraints
      - context.item.target_paths
      - context.item.depends_on
      - context.item.attempts
      - context.review.summary
      - context.review.required_changes
      - context.review.blockers
      - context.validation.item_id
      - context.validation.status
      - context.validation.summary
      - missing_prerequisites
      - validation_message
      - validation_exit_code
  mark_current_done:
    kind: agent_task
    label: Mark Current Done
    config:
      kind: agent_task
      prompt: Read the current milestone state in .spark/spec-implementation/current/milestones/<current milestone id>/state.json
        and .spark/spec-implementation/current/validation-result.json. Treat context.item.id as the only item that may be
        completed in this node. Require state.json.current_item_id and .spark/spec-implementation/current/validation-result.json.item_id
        to both equal context.item.id, require the matching state item to exist exactly once with status=in_progress, and
        require validation status=pass with all required suites passing. Mark only that matching item status as completed,
        clear current_item_id, preserve the rest of the queue, keep valid JSON, and respond with ONLY a JSON status envelope.
        Do not modify any other item status in this node. Use context_updates for context.item.id, context.item.title, context.item.summary,
        context.item.decision_ids, context.item.acceptance_criteria, context.item.constraints, context.item.target_paths,
        context.item.depends_on, context.item.attempts, context.review.summary, context.review.required_changes, context.review.blockers,
        context.validation.item_id, context.validation.status, context.validation.summary, missing_prerequisites, validation_message,
        and validation_exit_code by setting each to JSON null so the live binding is removed after completion. If any identity
        or validation mismatch exists, write .spark/spec-implementation/current/block-reason.md and return outcome fail with
        preferred_label Blocked without mutating queue state. Return outcome success only after the milestone state is updated
        and the live active-item binding is cleared.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
      reads_context:
      - context.item.id
      writes_context:
      - context.item.id
      - context.item.title
      - context.item.summary
      - context.item.decision_ids
      - context.item.acceptance_criteria
      - context.item.constraints
      - context.item.target_paths
      - context.item.depends_on
      - context.item.attempts
      - context.review.summary
      - context.review.required_changes
      - context.review.blockers
      - context.validation.item_id
      - context.validation.status
      - context.validation.summary
      - missing_prerequisites
      - validation_message
      - validation_exit_code
  next_item:
    kind: agent_task
    label: Next Item
    config:
      kind: agent_task
      prompt: 'Read the current milestone state in .spark/spec-implementation/current/milestones/<current milestone id>/state.json
        and choose the next ready work item. A ready item is pending and all of its depends_on items are already done. If
        a ready item exists, store its id and previous attempts as selected_id and previous_attempts before editing. Update
        that same state.json file before responding: modify only the item whose id equals selected_id, mark that item status=in_progress,
        set its attempts to previous_attempts + 1, set current_item_id to selected_id, preserve the rest of the queue, and
        keep the file valid JSON. Do not assume context_updates, routing, or any external orchestrator will update milestone_dir/state.json;
        the durable ledger write is this node''s responsibility and must happen before the final status envelope. After writing,
        reread state.json from disk and verify all Work-path invariants before responding: current_item_id equals selected_id;
        exactly one item has status=in_progress; that sole in_progress item''s id equals selected_id; that item''s attempts
        equal previous_attempts + 1; no other item changed status; and the context.item.id you will emit equals selected_id.
        If any invariant fails, repair state.json and reread it again before responding. If the invariants still cannot be
        made true, keep or write .spark/spec-implementation/current/block-reason.md describing the mismatch and return outcome
        fail with preferred_label Blocked rather than emitting Work. After the file is written and reread with all Work-path
        invariants true, respond with ONLY a JSON status envelope with outcome success, preferred_label Work, and context_updates
        for context.item.id, context.item.title, context.item.summary, context.item.decision_ids, context.item.acceptance_criteria,
        context.item.constraints, context.item.target_paths, context.item.depends_on, context.item.attempts, plus cleared
        context.review.summary, context.review.required_changes, context.review.blockers, context.validation.item_id, context.validation.status,
        context.validation.summary, missing_prerequisites, validation_message, and validation_exit_code. Return outcome success
        with preferred_label Work only after state.json on disk agrees with the emitted context.item.* binding and the selected
        item is the sole in_progress item. If no pending or in_progress items remain, clear current_item_id in state.json
        before responding and return outcome success with preferred_label Audit. On the Audit path, include context_updates
        that set the active item keys, review feedback keys, and validation scratch keys to JSON null so the live binding
        is fully cleared before milestone audit. Return outcome success with preferred_label Audit only after rereading state.json
        from disk and confirming current_item_id=null and no item is in_progress. If pending items remain but none are ready
        because of blocked dependencies or unresolved prerequisites, keep the milestone state valid and return outcome fail
        with preferred_label Blocked.'
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
      writes_context:
      - context.item.id
      - context.item.title
      - context.item.summary
      - context.item.decision_ids
      - context.item.acceptance_criteria
      - context.item.constraints
      - context.item.target_paths
      - context.item.depends_on
      - context.item.attempts
      - context.review.summary
      - context.review.required_changes
      - context.review.blockers
      - context.validation.item_id
      - context.validation.status
      - context.validation.summary
      - missing_prerequisites
      - validation_message
      - validation_exit_code
  plan_current:
    kind: agent_task
    label: Plan Current Item
    config:
      kind: agent_task
      prompt: 'Read .spark/spec-implementation/current/spec/architecture.md and .spark/spec-implementation/current/spec/contract-decisions.json.
        In active-workspace shorthand, the decision ledger is .spark/spec-implementation/current/spec/contract-decisions.json.
        Inspect files needed from the current repository and produce a concrete implementation plan for the current milestone
        item defined by context.item.summary, context.item.decision_ids, context.item.acceptance_criteria, context.item.constraints,
        and context.item.target_paths. Treat .spark/spec-implementation/current/spec/source.md as product behavior, .spark/spec-implementation/current/spec/architecture.md
        as the binding implementation contract, and .spark/spec-implementation/current/spec/contract-decisions.json as the
        approved resolution set for the item''s bound decisions. Convert the item''s decision_ids into explicit implementation
        and validation goals. Include the proof of done for this item: what evidence review should expect, what validation
        scope is appropriate, and which checks are required before the item can be considered complete. Default proof of done
        to the strongest deterministic repo-wide validation gate. If this item changes a documented public surface, include
        at least one check through that surface and explain how the bound decisions will be satisfied. When relevant, cover
        public bootstrap and installability, import and export wiring, validation truthfulness, docs or manifest updates,
        ignore rules, and touched-surface cohesion so the item can finish deliverably rather than only locally. Stay within
        the current cwd (the repository root). Do not inspect paths outside it. If review feedback exists in context.review.*,
        use it to refine the plan instead of repeating the item description. If the item appears to require prerequisite repair
        or broader repository-integrity work before it can complete cleanly, plan toward Rewrite rather than a brittle local
        workaround or a weaker contract than the bound decisions.'
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      reads_context:
      - context.item.id
      - context.item.title
      - context.item.summary
      - context.item.decision_ids
      - context.item.acceptance_criteria
      - context.item.constraints
      - context.item.target_paths
      - context.item.attempts
      - context.review.summary
      - context.review.required_changes
      - context.review.blockers
  prepare_milestone_state:
    kind: agent_task
    label: Prepare Milestone State
    config:
      kind: agent_task
      prompt: 'Read context.milestone.id, context.milestone.title, context.milestone.objective, context.milestone.requirement_ids,
        context.milestone.decision_ids, context.milestone.acceptance_criteria, context.milestone.target_paths, and context.milestone.attempts,
        then derive milestone_dir as .spark/spec-implementation/current/milestones/<context milestone id>/. Treat the bound
        context.milestone.* snapshot as authoritative for this child even if shared runtime binding files under .spark/spec-implementation/current/current-milestone.json
        later drift. Create milestone_dir if it does not exist. Write milestone_dir/state.json as valid JSON with this shape:
        {"milestone":{...current milestone snapshot including decision_ids...},"current_item_id":null,"items":[],"updated_at":"<timestamp>"}.
        Preserve any existing attempts history if the file already exists, but ensure the file remains valid and scoped to
        the current milestone. Respond with ONLY a JSON status envelope and return outcome success only after the milestone
        state file exists.'
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
      reads_context:
      - context.milestone.id
      - context.milestone.title
      - context.milestone.objective
      - context.milestone.requirement_ids
      - context.milestone.decision_ids
      - context.milestone.acceptance_criteria
      - context.milestone.target_paths
      - context.milestone.attempts
  prepare_validation:
    kind: agent_task
    label: Prepare Validation
    config:
      kind: agent_task
      prompt: 'Read .spark/spec-implementation/current/state.json only for request.validation_command, plus context.milestone.id,
        context.item.id, context.item.title, context.item.summary, context.item.target_paths, and the current milestone state
        in milestone_dir/state.json. Treat context.milestone.id and context.item.id as the authoritative live binding for
        the running worker, with milestone_dir/state.json as the durable ledger that must agree with them. Do not use shared
        runtime bindings under .spark/spec-implementation/current/current-milestone.json or state.json.current_milestone_id
        as the active milestone binding in this node, because runtime bookkeeping may legitimately drift while implementation
        is in flight. Write .spark/spec-implementation/current/run-milestone-validation.sh as a POSIX shell script that is
        itself the milestone validation entrypoint. Also write .spark/spec-implementation/current/validation-plan.json as
        valid JSON with fields item_id, item_title, entrypoint, resolved_command, scope_summary, and suites, where each suite
