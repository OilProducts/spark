schema_version: '1'
id: implement_spec_program
title: Implement Spec Program
metadata:
  software_development:
    launcher: true
description: A greenfield software-development program flow. It creates committed spec packages under specs/<slug>/, stores
  workflow state under .spark/spec-implementation/<slug>/, refreshes .spark/spec-implementation/current/ as a stable runtime
  alias to the active workspace, surfaces the committed spec package through current/spec/, extracts a requirement ledger,
  proposes an architecture, plans milestones, dispatches a milestone worker as a child flow, and audits conformance until
  the specification is covered or the effort is blocked.
goal: Implement a written specification in the repository by turning the spec into requirements, architecture, milestones,
  and validated milestone deliveries until all in-scope requirements are covered or the effort is blocked.
inputs:
- key: context.request.spec_path
  label: Spec Path
  type: string
  description: Path to the written spec in the project repository.
  required: true
- key: context.request.spec_slug
  label: Spec Slug
  type: string
  description: Optional human-readable slug for the committed spec package under specs/. If omitted, derive one from the spec
    filename.
  required: false
- key: context.request.scope_hint
  label: Scope Hint
  type: string
  description: Optional section, milestone, or subset to focus on first.
  required: false
- key: context.request.constraints
  label: Constraints
  type: string[]
  description: Optional implementation constraints or explicit non-goals.
  required: false
- key: context.request.target_paths
  label: Target Paths
  type: string[]
  description: Optional files or directories to focus on first.
  required: false
- key: context.request.validation_command
  label: Validation Command
  type: string
  description: Optional preferred repo-wide validation command. Milestone workers should treat it as the primary gate when
    it is deterministic and truthful, and use narrower checks only as supplements or when no stronger gate exists.
  required: false
defaults:
  llm_provider: codex
  llm_model: gpt-5.6-sol
  reasoning_effort: high
nodes:
  audit_milestone:
    kind: agent_task
    label: Audit Milestone
    config:
      kind: agent_task
      prompt: 'Read context.milestone.id, context.milestone.title, context.milestone.objective, context.milestone.requirement_ids,
        context.milestone.decision_ids, .spark/spec-implementation/current/spec/requirements.json, .spark/spec-implementation/current/milestones.json,
        .spark/spec-implementation/current/spec/architecture.md, .spark/spec-implementation/current/spec/contract-decisions.json,
        .spark/spec-implementation/current/spec/source.md, and .spark/spec-implementation/current/milestones/<context milestone
        id>/result.json if it exists. Also inspect context.stack.child.status, context.stack.child.outcome, context.stack.child.outcome_reason_code,
        and context.stack.child.outcome_reason_message. Treat context.milestone.* plus milestone-local child artifacts as
        the authoritative identity for the milestone under audit. If shared runtime binding files under .spark/spec-implementation/current/current-milestone.json
        or state.json.current_milestone_id drifted during the child run, judge those files as shared runtime bookkeeping rather
        than as the authoritative child control plane after dispatch. Treat .spark/spec-implementation/current/spec/source.md
        as the source of product behavior and external contract, .spark/spec-implementation/current/spec/architecture.md as
        the binding implementation contract, and .spark/spec-implementation/current/spec/contract-decisions.json as the approved
        machine-readable resolution set for any material interpretation, naming, ownership, or validation decision. Judge
        the milestone against its requirement_ids and decision_ids. If the milestone is satisfactorily implemented, treat
        milestones.json as the authoritative milestone queue ledger: update milestones.json and requirements.json to mark
        the covered milestone and requirements done, clear .spark/spec-implementation/current/state.json.current_milestone_id,
        remove or clear .spark/spec-implementation/current/current-milestone.json, and context_updates include context.milestone.id,
        context.milestone.title, context.milestone.objective, context.milestone.requirement_ids, context.milestone.decision_ids,
        context.milestone.acceptance_criteria, context.milestone.target_paths, and context.milestone.attempts set to JSON
        null so no completed milestone remains the live binding. Return outcome success only when the milestone''s touched
        surfaces are honestly deliverable for their scope, including truthful validation/bootstrap expectations, coherent
        exports, docs, manifests, ignore rules, and conformance to the bound contract decisions, with no reliance on test-only
        bootstrap hacks or weaker internal-only validation paths as the primary way the touched work is used. Do not accept
        a milestone if it skipped the strongest deterministic repo-wide gate that was available, if claimed public surfaces
        were validated only through internal or bypass paths, if a bound decision remains unmet, or if remaining decision-bound
        implementation work was downgraded into metadata-only sync. If the milestone is mostly complete but bounded remaining
        work still belongs inside this same milestone, leave the milestone current, keep the ledgers valid, and return outcome
        partial_success with preferred_label Extend so the milestone worker can continue. If the milestone decomposition is
        wrong or the remaining deliverability work should be replanned as bounded milestone-level follow-up, write .spark/spec-implementation/current/rewrite-milestones.json
        with replacement milestones and return outcome fail with preferred_label Rewrite. If the effort is blocked, update
        ledgers accordingly and return outcome fail with preferred_label Blocked. Do not silently choose between spec and
        architecture when a material conflict is missing from .spark/spec-implementation/current/spec/contract-decisions.json.
        Keep the decision tied to milestone completion and truthful deliverability, not optimism.'
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
      reads_context:
      - context.milestone.id
      - context.milestone.title
      - context.milestone.objective
      - context.milestone.requirement_ids
      - context.milestone.decision_ids
      - context.stack.child.status
      - context.stack.child.outcome
      - context.stack.child.outcome_reason_code
      - context.stack.child.outcome_reason_message
      writes_context:
      - context.milestone.id
      - context.milestone.title
      - context.milestone.objective
      - context.milestone.requirement_ids
      - context.milestone.decision_ids
      - context.milestone.acceptance_criteria
      - context.milestone.target_paths
      - context.milestone.attempts
  blocked_exit:
    kind: agent_task
    label: Blocked Exit
    config:
      kind: agent_task
      prompt: Inspect .spark/spec-implementation/current/state.json, .spark/spec-implementation/current/spec/source.md, .spark/spec-implementation/current/spec/requirements.json,
        .spark/spec-implementation/current/milestones.json, and any current milestone artifacts. Write context.workflow_outcome="failure",
        context.workflow_outcome_reason_code="blocked", and context.workflow_outcome_reason_message to a short summary of
        what remains blocked and why the program could not complete automatically. Respond with ONLY a JSON status envelope
        and return outcome success only after those context updates are included.
    retry:
      max_retries: 1
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
      writes_context:
      - context.workflow_outcome
      - context.workflow_outcome_reason_code
      - context.workflow_outcome_reason_message
  commit_milestone:
    kind: tool
    label: Commit Milestone
    config:
      kind: tool
      command: "set -euo pipefail\nif ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then\n  echo \"Skipping milestone\
        \ commit: current repository is not a git work tree.\"\n  exit 0\nfi\nif git diff --quiet && git diff --cached --quiet\
        \ && [ -z \"$(git ls-files --others --exclude-standard)\" ]; then\n  echo \"Skipping milestone commit: no repository\
        \ changes detected.\"\n  exit 0\nfi\ngit add -A\ngit commit -m \"Accepted milestone\""
    execution:
      reasoning_effort: high
    extensions:
      tool.artifacts.stderr: commit-node.stderr.txt
      tool.artifacts.stdout: commit-node.stdout.txt
      tool.command: "set -euo pipefail\nif ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then\n  echo \"Skipping\
        \ milestone commit: current repository is not a git work tree.\"\n  exit 0\nfi\nif git diff --quiet && git diff --cached\
        \ --quiet && [ -z \"$(git ls-files --others --exclude-standard)\" ]; then\n  echo \"Skipping milestone commit: no\
        \ repository changes detected.\"\n  exit 0\nfi\ngit add -A\ngit commit -m \"Accepted milestone\""
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
  design_architecture:
    kind: agent_task
    label: Design Architecture
    config:
      kind: agent_task
      prompt: Read .spark/spec-implementation/current/spec/source.md and .spark/spec-implementation/current/spec/requirements.json.
        Treat .spark/spec-implementation/current/spec/source.md as the source of product behavior and external contract for
        this run. Do not reread another duplicate copy of the same spec from the repository. Read files needed from the current
        repository. Stay within the current cwd (the repository root). Do not inspect paths outside it. Write .spark/spec-implementation/current/spec/architecture.md
        as the initial implementation architecture for the spec, and write .spark/spec-implementation/current/spec/contract-decisions.json
        as valid JSON with a top-level decisions array. The durable contract ledger is .spark/spec-implementation/current/spec/contract-decisions.json,
        symlinked from specs/<slug>/. Each decision must include id, title, summary, requirement_ids, spec_refs, architecture_refs,
        behavioral_contract, implementation_contract, and validation_expectations. The architecture must define the canonical
        repository topology, implementation boundaries, documented public interface, validation strategy, repository hygiene
        expectations, and any dependencies between requirements. The contract-decisions file must capture every material spec-versus-architecture
        resolution, naming normalization, surface ownership choice, or validation expectation needed to implement the architecture
        truthfully. If no material decisions are needed, still write a valid file with decisions=[]. Avoid wrapper-only or
        duplicate delivery layers unless an external compatibility contract requires them. Avoid designs that rely on environment-specific
        hacks, test-only bootstrap behavior, or compatibility shims as the primary way the system works. Keep the plan grounded
        in the current repository and the written spec rather than idealized greenfield assumptions. Respond with ONLY a JSON
        status envelope and return outcome success only after both files are written.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
  done:
    kind: exit
    label: Done
    config:
      kind: exit
    execution:
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
  evaluate_architecture:
    kind: agent_task
    label: Evaluate Architecture
    config:
      kind: agent_task
      prompt: Read .spark/spec-implementation/current/spec/architecture.md, .spark/spec-implementation/current/spec/contract-decisions.json,
        .spark/spec-implementation/current/spec/source.md, and .spark/spec-implementation/current/spec/requirements.json.
        The durable contract ledger is .spark/spec-implementation/current/spec/contract-decisions.json. Critique the proposed
        architecture before any milestone planning begins. Confirm the architecture defines a coherent repository topology,
        implementation boundaries, sequencing, public interface, validation strategy, and repository hygiene expectations
        that can realistically produce a deliverable repository from the current spec and repository context. Confirm that
        every material spec-versus-architecture resolution is explicitly captured in .spark/spec-implementation/current/spec/contract-decisions.json,
        and that each decision links requirement_ids, spec_refs, architecture_refs, behavioral_contract, implementation_contract,
        and validation_expectations coherently. If the architecture is ready for milestone planning, return outcome success
        only when .spark/spec-implementation/current/spec/architecture.md and .spark/spec-implementation/current/spec/contract-decisions.json
        are mutually consistent. If the architecture or decisions need bounded revision, write .spark/spec-implementation/current/architecture-rework.md
        with concrete feedback and return outcome fail with preferred_label Rework. Use Rework when the architecture or decisions
        silently narrow, rename, or reinterpret product behavior without an explicit approved decision. If the architecture
        is fundamentally unsound, the decisions are materially inconsistent with the spec, or the inputs are too under-specified
        to proceed truthfully, return outcome fail with preferred_label Blocked. Respond with ONLY a JSON status envelope.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
  extract_requirements:
    kind: agent_task
    label: Extract Requirements
    config:
      kind: agent_task
      prompt: 'Read .spark/spec-implementation/current/spec/source.md as the authoritative spec snapshot for this run. Do
        not reread context.request.spec_path or another duplicate copy of the same spec from the repository. Read files needed
        from the current repository. Stay within the current cwd (the repository root). Do not inspect paths outside it. Write
        .spark/spec-implementation/current/spec/requirements.json as valid JSON with a requirements array. Each requirement
        must include: id, spec_refs, title, summary, acceptance_criteria, dependencies, target_paths, status, milestone_id,
        and notes. Use status=pending for newly extracted requirements. Prefer precise, testable requirements over paraphrased
        prose. Preserve scope_hint, constraints, and target_paths intent from .spark/spec-implementation/current/state.json
        when deciding what is in scope. Respond with ONLY a JSON status envelope and return outcome success only after the
        requirements ledger is written.'
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
      reads_context:
      - context.request.spec_path
      - context.request.scope_hint
      - context.request.constraints
      - context.request.target_paths
  final_conformance_audit:
    kind: agent_task
    label: Final Conformance Audit
    config:
      kind: agent_task
      prompt: Read .spark/spec-implementation/current/spec/source.md, .spark/spec-implementation/current/spec/requirements.json,
        .spark/spec-implementation/current/milestones.json, .spark/spec-implementation/current/spec/architecture.md, and .spark/spec-implementation/current/spec/contract-decisions.json.
        Treat .spark/spec-implementation/current/spec/source.md as the source of product behavior and external contract, .spark/spec-implementation/current/spec/architecture.md
        as the binding implementation contract, and .spark/spec-implementation/current/spec/contract-decisions.json as the
        approved resolution set. Read the current repository state only as needed to judge whether all in-scope requirements
        are now covered. Treat unresolved contract decisions that are bound to in-scope requirements as uncovered requirement
        work, not as cosmetic follow-up. If all in-scope requirements and their bound decisions are covered, respond with
        ONLY a JSON status envelope with outcome success. If uncovered but implementable requirement or decision work remains,
        append or revise milestones in .spark/spec-implementation/current/milestones.json and return outcome fail with preferred_label
        Extend. Milestones appended here must use the milestone schema including decision_ids. If the remaining gap is blocked
        on ambiguity, missing external input, or a fundamental unresolved issue, leave the ledgers valid and return outcome
        fail with preferred_label Blocked. Keep this decision tied to requirement coverage only; any remaining deliverability
        or repository-integrity cleanup that can fit inside one final cleanup/refactor milestone belongs to repository_integrity_audit.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
  next_milestone:
    kind: agent_task
    label: Next Milestone
    config:
      kind: agent_task
      prompt: 'Read .spark/spec-implementation/current/milestones.json as the authoritative milestone queue ledger. Read .spark/spec-implementation/current/state.json
        and .spark/spec-implementation/current/current-milestone.json only to keep those binding artifacts aligned with milestones.json;
        do not let stale binding files block progress when milestones.json truthfully shows the current milestone is already
        completed. Before choosing the next milestone, mechanically repair stale shared runtime bindings when the intended
        state is clear from milestones.json: if current_milestone_id or current-milestone.json points to a completed milestone,
        clear both; if they disagree with the ready pending milestone you are about to dispatch, rewrite them to match that
        milestone. A ready milestone is pending and all of its depends_on milestones are done. If a ready milestone exists,
        mark it in_progress, increment its attempts, set current_milestone_id in .spark/spec-implementation/current/state.json,
        write .spark/spec-implementation/current/current-milestone.json for that milestone, and respond with ONLY a JSON status
        envelope with outcome success, preferred_label Work, and context_updates for context.milestone.id, context.milestone.title,
        context.milestone.objective, context.milestone.requirement_ids, context.milestone.decision_ids, context.milestone.acceptance_criteria,
        context.milestone.target_paths, and context.milestone.attempts. If no pending or in_progress milestones remain, clear
        current_milestone_id, remove or clear .spark/spec-implementation/current/current-milestone.json, and return outcome
        success with preferred_label Audit, with context_updates that set context.milestone.id, context.milestone.title, context.milestone.objective,
        context.milestone.requirement_ids, context.milestone.decision_ids, context.milestone.acceptance_criteria, context.milestone.target_paths,
        and context.milestone.attempts to JSON null. If milestones remain but none are ready because of blocked dependencies
        or unresolved prerequisites after any mechanical binding repair, keep the ledgers valid and return outcome fail with
        preferred_label Blocked.'
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
      writes_context:
      - context.milestone.id
      - context.milestone.title
      - context.milestone.objective
      - context.milestone.requirement_ids
      - context.milestone.decision_ids
      - context.milestone.acceptance_criteria
      - context.milestone.target_paths
      - context.milestone.attempts
  plan_cleanup_milestone:
    kind: agent_task
    label: Plan Cleanup Milestone
    config:
      kind: agent_task
      prompt: Read .spark/spec-implementation/current/repository-integrity-gaps.md, .spark/spec-implementation/current/spec/source.md,
        .spark/spec-implementation/current/spec/requirements.json, .spark/spec-implementation/current/milestones.json, .spark/spec-implementation/current/spec/architecture.md,
        and .spark/spec-implementation/current/spec/contract-decisions.json. Append or revise at most one additional pending
        cleanup/refactor milestone that closes the documented repository-integrity gaps. Preserve completed and in_progress
        milestones exactly as they are. If an earlier pending cleanup/refactor milestone already exists for the same final-gap
        work, revise it instead of appending a duplicate. The cleanup milestone must use the milestone schema including decision_ids,
        and it may use an empty requirement_ids list plus empty decision_ids only when the work is repository-integrity-only
        and does not add new requirement or decision coverage. Keep milestones.json valid JSON and respond with ONLY a JSON
        status envelope. Return outcome success only after the cleanup milestone plan is updated.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
  plan_milestones:
    kind: agent_task
    label: Plan Milestones
    config:
      kind: agent_task
      prompt: 'Read .spark/spec-implementation/current/spec/source.md, .spark/spec-implementation/current/spec/requirements.json,
        .spark/spec-implementation/current/spec/architecture.md, and .spark/spec-implementation/current/spec/contract-decisions.json.
        Treat .spark/spec-implementation/current/spec/source.md as the source of product behavior and external contract, .spark/spec-implementation/current/spec/architecture.md
        as the binding implementation contract, and .spark/spec-implementation/current/spec/contract-decisions.json as the
        approved resolution set. Do not reread another duplicate copy of the same spec from the repository. Read files needed
        from the current repository. Stay within the current cwd (the repository root). Do not inspect paths outside it. Write
        .spark/spec-implementation/current/milestones.json as valid JSON with a milestones array. Each milestone must include:
        id, title, objective, requirement_ids, decision_ids, acceptance_criteria, target_paths, depends_on, status, attempts,
        and notes. The milestones should be large enough to matter architecturally but small enough to implement and verify
        coherently. Use status=pending and attempts=0 for new milestones. Every relevant contract decision must appear in
        at least one milestone''s decision_ids, and milestone acceptance criteria plus target_paths must reflect those bound
        decisions directly rather than leaving them only in notes. Do not simply echo the requirements ledger; group requirements
        and decisions into meaningful delivery slices. Respond with ONLY a JSON status envelope and return outcome success
        only after the milestone plan is written.'
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
  prepare_workspace:
    kind: agent_task
    label: Prepare Workspace
    config:
      kind: agent_task
      prompt: 'Using context.request.spec_path, optional context.request.spec_slug, context.request.scope_hint, context.request.constraints,
        context.request.target_paths, and context.request.validation_command when present, create specs/ and .spark/spec-implementation/
        at the repository root if they do not exist. Resolve a human-readable workspace slug as follows: if context.request.spec_slug
        is present, normalize it to lowercase kebab-case; otherwise derive it from the spec filename by lowercasing, replacing
        non-alphanumeric runs with ''-'', collapsing duplicate ''-'', and trimming leading/trailing ''-''. Create the committed
        spec package directory at specs/<slug>/. Copy the source spec into specs/<slug>/source.md. Create the runtime workspace
        at .spark/spec-implementation/<slug>/. Inside that runtime workspace, create or refresh a spec symlink pointing to
        specs/<slug>/ so downstream nodes can read the committed package through .spark/spec-implementation/current/spec/.
        Create or refresh .spark/spec-implementation/current as a symlink to .spark/spec-implementation/<slug>/ so downstream
        nodes and tool commands can use a stable runtime alias while the slugged workspace remains the source of truth for
        bookkeeping. Write .spark/spec-implementation/<slug>/state.json as valid JSON with this shape: {"request":{"spec_path":"...","spec_slug":"...","scope_hint":"...","constraints":[...],"target_paths":[...],"validation_command":"..."},"spec":{"slug":"...","package_dir":"specs/<slug>","source_path":"specs/<slug>/source.md"},"runtime":{"path":".spark/spec-implementation/<slug>","current_alias":".spark/spec-implementation/current"},"current_milestone_id":null,"updated_at":"<timestamp>"}.
        If the repository has a .gitignore file, ensure it ignores .spark/ exactly once: append a minimal .spark/ entry only
        when missing, and remove duplicate .spark/ lines without disturbing unrelated rules. Respond with ONLY a JSON status
        envelope, do not include extra top-level keys such as details, and return outcome success only after the committed
        spec package, the runtime workspace, the spec symlink, the current alias, and the workspace files are written.'
    retry:
      max_retries: 1
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
      reads_context:
      - context.request.spec_path
      - context.request.spec_slug
      - context.request.scope_hint
      - context.request.constraints
      - context.request.target_paths
      - context.request.validation_command
  repository_integrity_audit:
    kind: agent_task
    label: Repository Integrity Audit
    config:
      kind: agent_task
      prompt: Read .spark/spec-implementation/current/spec/source.md, .spark/spec-implementation/current/spec/requirements.json,
        .spark/spec-implementation/current/milestones.json, .spark/spec-implementation/current/spec/architecture.md, and .spark/spec-implementation/current/spec/contract-decisions.json,
        and the current repository state as needed. Decide whether the repository is now honestly deliverable, not merely
        internally coherent. Check that the repository can be built, run, imported, and validated from committed metadata,
        manifests, bootstrap files, docs, public exports, and the approved contract decisions when applicable; that tests
        are behavioral rather than brittle source-text or path-hack checks; that tracked local, generated, cache, IDE, or
        Spark workflow artifacts are not part of the deliverable; that docs, exports, manifests, and ignore rules stay coherent;
        and that no obvious duplicate validators or mixed-responsibility god files remain as the final state. Success requires
        a clear source of truth for delivered surfaces, no unjustified wrapper-only duplicate layers, essential repo metadata
        and docs for the technologies in use, and no bound contract decision left satisfied only through weaker internal or
        metadata-only paths. If the repository is deliverable, respond with ONLY a JSON status envelope with outcome success.
        If a bounded final cleanup/refactor milestone can close the remaining gaps, write .spark/spec-implementation/current/repository-integrity-gaps.md
        with the missing work. The cleanup ledger is .spark/spec-implementation/current/repository-integrity-gaps.md. Return
        outcome fail with preferred_label Extend. If the remaining gaps exceed one additional cleanup/refactor milestone,
        require broader redesign, or depend on missing external input, return outcome fail with preferred_label Blocked. Respond
        with ONLY a JSON status envelope.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
  revise_architecture:
    kind: agent_task
    label: Revise Architecture
    config:
      kind: agent_task
      prompt: Read .spark/spec-implementation/current/spec/architecture.md, .spark/spec-implementation/current/spec/contract-decisions.json,
        .spark/spec-implementation/current/spec/requirements.json, .spark/spec-implementation/current/spec/source.md, and
        .spark/spec-implementation/current/architecture-rework.md if it exists. Refine the architecture so it better partitions
        the work, clarifies sequencing, reduces execution risk, and keeps the implementation contract aligned with the product
        behavior in the spec. Update .spark/spec-implementation/current/spec/contract-decisions.json alongside the architecture
        so every material resolution remains explicit, complete, and machine-readable. Preserve valid parts of the existing
        design instead of rewriting aimlessly. Respond with ONLY a JSON status envelope and return outcome success only after
        both files are updated.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
  rewrite_milestones:
    kind: agent_task
    label: Rewrite Milestones
    config:
      kind: agent_task
      prompt: Read context.milestone.id, .spark/spec-implementation/current/milestones.json, and .spark/spec-implementation/current/rewrite-milestones.json.
        Treat context.milestone.id as the authoritative milestone to replace even if shared runtime bindings under .spark/spec-implementation/current/current-milestone.json
        or state.json.current_milestone_id drifted during the child run. Replace that milestone with the milestone entries
        from rewrite-milestones.json, set each replacement milestone status to pending and attempts to 0 unless already provided,
        clear current_milestone_id in .spark/spec-implementation/current/state.json, remove or clear .spark/spec-implementation/current/current-milestone.json,
        keep both JSON files valid, and respond with ONLY a JSON status envelope. Return outcome success only after the milestone
        plan is updated.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
      reads_context:
      - context.milestone.id
  run_milestone:
    kind: subflow
    label: Run Milestone Worker
    config:
      kind: subflow
      flow_ref: implement-milestone.yaml
    execution:
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    manager:
      max_cycles: 1
      poll_interval: 0ms
  start:
    kind: start
    label: Start
    config:
      kind: start
    execution:
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
  validate_milestone_plan:
    kind: agent_task
    label: Validate Milestone Plan
    config:
      kind: agent_task
      prompt: Read .spark/spec-implementation/current/spec/source.md, .spark/spec-implementation/current/spec/requirements.json,
        .spark/spec-implementation/current/milestones.json, .spark/spec-implementation/current/spec/architecture.md, and .spark/spec-implementation/current/spec/contract-decisions.json.
        The decision ledger is .spark/spec-implementation/current/spec/contract-decisions.json. Validate the milestone, requirement,
        and decision ledgers before any long-running implementation work begins. Confirm milestone ids are unique, every milestone
        depends_on id exists, no milestone depends on itself, the milestone dependency graph is acyclic, every requirement
        milestone_id points to a real milestone, every milestone requirement_ids entry exists in the requirement ledger and
        stays consistent with the requirements assigned to that milestone, and requirement dependency ordering is compatible
        with milestone ordering. Confirm every milestone decision_id exists in .spark/spec-implementation/current/spec/contract-decisions.json,
        every relevant decision is covered by at least one milestone, and milestone acceptance criteria plus target_paths
        do not contradict their bound decisions. Cleanup milestones may use empty requirement_ids and empty decision_ids only
        when they add no requirement or decision coverage. Repair purely mechanical ledger inconsistencies in place when the
        intended decomposition is still clear, keeping the JSON files valid. If decision coverage is missing, a material conflict
        is unresolved, the decomposition is structurally wrong, or the plan cannot be repaired truthfully from the written
        ledgers, leave the files valid and return outcome fail with preferred_label Replan so milestone planning can be regenerated.
        If the plan is coherent after any needed repairs, return outcome success. Respond with ONLY a JSON status envelope.
    execution:
      llm_model: gpt-5.6-sol
      reasoning_effort: high
    runtime:
      allow_partial: false
      auto_status: false
      goal_gate: false
    contracts:
      response: status_envelope
