schema_version: '1'
id: merge_change
title: Merge Change
description: Integrate a completed Spark branch into a clean local target using a validated explicit merge commit.
goal: Integrate a completed Spark branch into a clean local target using a validated explicit merge commit.
inputs:
- key: context.request.source_ref
  label: Source Ref
  type: string
  description: Branch or commit to integrate into the current target checkout.
  required: true
- key: context.request.validation_command
  label: Validation Command
  type: string
  required: false
defaults:
  fidelity: summary:high
  llm_provider: codex
  llm_model: gpt-5.6-sol
metadata:
  software_development:
    launcher: true
nodes:
  start:
    kind: start
    label: Start
    config:
      kind: start
  normalize_task:
    kind: agent_task
    label: Normalize Task
    config:
      kind: agent_task
      prompt: 'Normalize the integration request. context.request.source_ref names the branch or commit to integrate; fail when it is missing or does not resolve in this repository. Resolve the validation command: use context.request.validation_command when provided, otherwise discover the truthful project validation command from the repository (build files, CI configuration, contributor docs) without running it. Do not modify any files. Respond with ONLY a JSON status envelope whose context_updates set context.task.source_ref and context.task.validation_command.'
    contracts:
      response: status_envelope
      reads_context:
      - context.request.source_ref
      - context.request.validation_command
      writes_context:
      - context.task.source_ref
      - context.task.validation_command
  prepare_integration:
    kind: tool
    label: Prepare Integration
    config:
      kind: tool
      command: |
        set -eu
        if [ -n "$(git status --porcelain)" ]; then
          echo "target checkout has uncommitted changes; commit or stash before integrating" >&2
          exit 1
        fi
        target_branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$target_branch" = "HEAD" ]; then
          echo "target checkout is on a detached HEAD; check out the target branch first" >&2
          exit 1
        fi
        target_commit=$(git rev-parse HEAD)
        source_commit=$(git rev-parse --verify "${SPARK_SOURCE_REF}^{commit}")
        repo_root=$(git rev-parse --show-toplevel)
        # Worktrees live under <repo>/.spark, never inside .git: tooling such
        # as Vite refuses to serve or resolve paths matching **/.git/**. The
        # directory ignores itself so the target checkout stays clean.
        integration_root="${repo_root}/.spark/integrations"
        worktree="${integration_root}/${SPARK_RUN_ID}"
        if [ ! -d "$worktree" ]; then
          mkdir -p "$integration_root"
          printf '*\n' > "${repo_root}/.spark/.gitignore"
          git worktree add --detach "$worktree" "$target_commit" >/dev/null
        fi
        cd "$worktree"
        merge_head=$(git rev-parse --git-path MERGE_HEAD)
        if [ ! -f "$merge_head" ]; then
          git merge --no-ff --no-commit "$source_commit" >/dev/null 2>&1 || true
        fi
        conflicts=$(git diff --name-only --diff-filter=U | wc -l | tr -d ' ')
        printf '{"path":"%s","target_branch":"%s","target_commit":"%s","source_commit":"%s","conflict_count":%s}' \
          "$worktree" "$target_branch" "$target_commit" "$source_commit" "$conflicts"
      env_map:
        SPARK_RUN_ID: internal.run_id
        SPARK_SOURCE_REF: context.task.source_ref
      output_map:
        context.integration.path: path
        context.integration.target_branch: target_branch
        context.integration.target_commit: target_commit
        context.integration.source_commit: source_commit
        context.integration.conflict_count: conflict_count
    contracts:
      writes_context:
      - context.integration.path
      - context.integration.target_branch
      - context.integration.target_commit
      - context.integration.source_commit
      - context.integration.conflict_count
  resolve_conflicts:
    kind: subflow
    label: Resolve Conflicts
    config:
      kind: subflow
      flow_ref: workers/resolve-merge-conflicts.yaml
      input_map:
        context.integration.source_commit: context.integration.source_commit
        context.integration.target_commit: context.integration.target_commit
    manager:
      child_workdir_from: context.integration.path
  validate:
    kind: tool
    label: Validate
    config:
      kind: tool
      command: |
        set -eu
        cd "$SPARK_INTEGRATION_PATH"
        if [ -n "$(git diff --name-only --diff-filter=U)" ]; then
          echo "unresolved merge conflicts remain" >&2
          exit 1
        fi
        sh -ec "$SPARK_VALIDATION_COMMAND"
      env_map:
        SPARK_INTEGRATION_PATH: context.integration.path
        SPARK_VALIDATION_COMMAND: context.task.validation_command
  finish_merge:
    kind: tool
    label: Finish Merge
    config:
      kind: tool
      command: |
        set -eu
        if [ -n "$(git status --porcelain)" ]; then
          echo "target checkout became dirty during integration" >&2
          exit 1
        fi
        current_target=$(git rev-parse HEAD)
        if [ "$current_target" != "$SPARK_TARGET_COMMIT" ]; then
          echo "target moved during integration: $SPARK_TARGET_COMMIT -> $current_target" >&2
          exit 1
        fi
        git -C "$SPARK_INTEGRATION_PATH" add --all
        git -C "$SPARK_INTEGRATION_PATH" commit -m "Merge ${SPARK_SOURCE_REF} (spark run ${SPARK_RUN_ID})" >/dev/null
        merge_commit=$(git -C "$SPARK_INTEGRATION_PATH" rev-parse HEAD)
        git merge --ff-only "$merge_commit" >/dev/null
        git worktree remove "$SPARK_INTEGRATION_PATH"
        printf '{"merge_commit":"%s"}' "$merge_commit"
      env_map:
        SPARK_INTEGRATION_PATH: context.integration.path
        SPARK_TARGET_COMMIT: context.integration.target_commit
        SPARK_SOURCE_REF: context.task.source_ref
        SPARK_RUN_ID: internal.run_id
      output_map:
        context.integration.merge_commit: merge_commit
    contracts:
      writes_context:
      - context.integration.merge_commit
  done:
    kind: exit
    label: Done
    config:
      kind: exit
      result_summary: true
edges:
- from: start
  to: normalize_task
- from: normalize_task
  to: prepare_integration
  condition: outcome=success
- from: prepare_integration
  to: resolve_conflicts
  condition: outcome=success
- from: resolve_conflicts
  to: validate
  condition: outcome=success
- from: validate
  to: finish_merge
  condition: outcome=success
- from: finish_merge
  to: done
  condition: outcome=success
