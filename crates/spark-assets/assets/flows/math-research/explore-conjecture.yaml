schema_version: '1'
id: explore_conjecture
title: Explore Conjecture
description: Survey an open problem, run computational experiments with the math-lab container's solver stack, verify every certificate, and synthesize honestly-labeled findings that are adversarially reviewed before commit. Launch with execution_profile_id math-lab.
goal: Produce verified computational evidence and honestly-labeled findings about the stated problem.
inputs:
- key: context.request.problem
  label: Problem
  type: string
  description: The open problem or conjecture to explore, with any known constraints or prior results worth starting from.
  required: true
- key: context.request.focus
  label: Focus
  type: string
  description: Optional focus for this session (a case, a bound, a construction family, a computational budget).
  required: false
defaults:
  fidelity: summary:high
  llm_provider: codex
  llm_model: gpt-5.6-sol
metadata:
  math_research:
    launcher: true
    required_execution_profile: math-lab
nodes:
  start:
    kind: start
    label: Start
    config:
      kind: start
  prepare_workspace:
    kind: tool
    label: Prepare Workspace
    config:
      kind: tool
      command: |-
        set -eu
        mkdir -p .mathlab experiments
        if [ ! -f AGENTS.md ] && [ -f /opt/mathlab/workspace-template/AGENTS.md ]; then
          cp /opt/mathlab/workspace-template/AGENTS.md AGENTS.md
        fi
        if [ ! -f DOSSIER.md ] && [ -f /opt/mathlab/workspace-template/DOSSIER.md ]; then
          cp /opt/mathlab/workspace-template/DOSSIER.md DOSSIER.md
        fi
        git init -q 2>/dev/null || true
    extensions:
      tool.artifacts.stderr: prepare-workspace.stderr.txt
      tool.artifacts.stdout: prepare-workspace.stdout.txt
      tool.command: |-
        set -eu
        mkdir -p .mathlab experiments
        if [ ! -f AGENTS.md ] && [ -f /opt/mathlab/workspace-template/AGENTS.md ]; then
          cp /opt/mathlab/workspace-template/AGENTS.md AGENTS.md
        fi
        if [ ! -f DOSSIER.md ] && [ -f /opt/mathlab/workspace-template/DOSSIER.md ]; then
          cp /opt/mathlab/workspace-template/DOSSIER.md DOSSIER.md
        fi
        git init -q 2>/dev/null || true
  survey:
    kind: agent_task
    label: Survey
    config:
      kind: agent_task
      prompt: 'Read DOSSIER.md first per AGENTS.md dossier discipline: do not re-derive results it records, and do not re-run attacks it records as failed without a new reason. Then survey the problem stated in context.request.problem (narrowed by context.request.focus when present) without running experiments yet. Restate the problem precisely, record what is known — including whether the problem or nearby cases are already resolved in the literature, labeled per AGENTS.md rules — and design a small set of concrete computational experiments the installed engines can run (SAT via cadical/kissat with DRAT certificates, SMT via z3/cvc5, graph enumeration via nauty-geng, number theory via PARI/GP, optimization via CBC/CSDP, bespoke programs in Python or C). Write the survey and the experiment plan to survey.md. Respond with ONLY a JSON status envelope whose context_updates set context.survey.summary and context.survey.plan.'
    contracts:
      response: status_envelope
      reads_context:
      - context.request.problem
      - context.request.focus
      writes_context:
      - context.survey.summary
      - context.survey.plan
  experiment:
    kind: agent_task
    label: Experiment
    config:
      kind: agent_task
      prompt: 'Execute the experiment plan from context.survey.plan. Implement each experiment under experiments/ as runnable programs with fixed seeds and exact inputs; run them; keep raw outputs, and for every SAT result keep the DRAT certificate beside its CNF. Write experiments/verify.sh: a deterministic script that re-checks all machine-checkable evidence (drat-trim on each certificate, digest comparison of exhaustive-search outputs, re-execution of cheap checks) and exits nonzero on any mismatch — the next node runs it as a gate, and evidence it cannot re-verify does not exist. If .mathlab/verify.log exists it holds the output of a failed previous verification; fix the evidence or the script honestly rather than weakening checks. If context.review.required_changes is present, close those gaps. Record an experiment log in experiments/log.md. Respond with ONLY a JSON status envelope whose context_updates set context.experiments.summary.'
    contracts:
      response: status_envelope
      reads_context:
      - context.survey.plan
      - context.review.required_changes
      writes_context:
      - context.experiments.summary
  verify_evidence:
    kind: tool
    label: Verify Evidence
    config:
      kind: tool
      command: |-
        set -eu
        mkdir -p .mathlab
        if [ ! -x experiments/verify.sh ] && [ ! -f experiments/verify.sh ]; then
          echo 'GATE FAILURE: experiments/verify.sh is missing.' | tee .mathlab/verify.log
          exit 1
        fi
        if bash experiments/verify.sh > .mathlab/verify.log 2>&1; then
          cat .mathlab/verify.log
          rm -f .mathlab/verify.log
        else
          cat .mathlab/verify.log
          exit 1
        fi
    extensions:
      tool.artifacts.stderr: verify-evidence.stderr.txt
      tool.artifacts.stdout: verify-evidence.stdout.txt
      tool.command: |-
        set -eu
        mkdir -p .mathlab
        if [ ! -x experiments/verify.sh ] && [ ! -f experiments/verify.sh ]; then
          echo 'GATE FAILURE: experiments/verify.sh is missing.' | tee .mathlab/verify.log
          exit 1
        fi
        if bash experiments/verify.sh > .mathlab/verify.log 2>&1; then
          cat .mathlab/verify.log
          rm -f .mathlab/verify.log
        else
          cat .mathlab/verify.log
          exit 1
        fi
  synthesize:
    kind: agent_task
    label: Synthesize
    config:
      kind: agent_task
      prompt: 'Synthesize the verified experimental results into findings.md: what was computed, what it suggests, and what it rules out. Label every claim per AGENTS.md — new proof, formalization of a known result, located in literature, or computational evidence — and state the exact scope of each computation (parameters covered, cases exhausted, certificates checked). Conjectures must be stated as conjectures with the evidence that motivates them and the smallest open case. Then append a session entry to DOSSIER.md per its structure and update its status board: outcome, established results, failed attacks with what they taught, verified data locations, and open subproblems; dossier entries are append-only. Propose the natural next session in a closing section. Respond with ONLY a JSON status envelope whose context_updates set context.findings.summary.'
    contracts:
      response: status_envelope
      reads_context:
      - context.survey.summary
      - context.experiments.summary
      writes_context:
      - context.findings.summary
  review_findings:
    kind: agent_task
    label: Review Findings
    config:
      kind: agent_task
      prompt: 'You are the adversarial reviewer of experimental mathematics. Treat findings.md, DOSSIER.md, and experiments/ as untrusted claims. Check that every claim is labeled per AGENTS.md and the label is truthful; that computational scopes are stated exactly and match what the programs actually cover (read the programs, not the prose); that certificates exist and experiments/verify.sh genuinely re-checks them rather than rubber-stamping; and that nothing presented as evidence is unreproducible. Check the DOSSIER.md session entry: it must be present, honest, and append-only — failed attacks recorded, nothing inflated, no prior entries rewritten. Spot-check by re-running at least one experiment. Return outcome success only when the findings are honest, scoped, and verified. On failure, set context_updates for context.review.required_changes listing each violation precisely, and route your outcome preferred_label to the node that owns the fix: Experiment for evidence problems, Synthesize for labeling or scope problems. On success, clear context.review.required_changes to null. Respond with ONLY a JSON status envelope.'
    runtime:
      error_policy: continue
    contracts:
      response: status_envelope
      reads_context:
      - context.findings.summary
      - context.experiments.summary
      writes_context:
      - context.review.required_changes
  commit_findings:
    kind: tool
    label: Commit Findings
    config:
      kind: tool
      command: |-
        set -eu
        if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
          echo "Skipping commit: no repository changes detected."
          exit 0
        fi
        git add -A
        git commit -m "Explore: $(head -c 72 survey.md 2>/dev/null | head -1 || echo session)"
    extensions:
      tool.artifacts.stderr: commit-findings.stderr.txt
      tool.artifacts.stdout: commit-findings.stdout.txt
      tool.command: |-
        set -eu
        if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
          echo "Skipping commit: no repository changes detected."
          exit 0
        fi
        git add -A
        git commit -m "Explore: $(head -c 72 survey.md 2>/dev/null | head -1 || echo session)"
  done:
    kind: exit
    label: Done
    config:
      kind: exit
edges:
- from: start
  to: prepare_workspace
- from: prepare_workspace
  to: survey
- from: survey
  to: experiment
- from: experiment
  to: verify_evidence
- from: verify_evidence
  to: experiment
  label: Fix Evidence
  condition: outcome=fail
  extensions:
    loop_restart: false
- from: verify_evidence
  to: synthesize
- from: review_findings
  to: experiment
  label: Fix Evidence
  condition: outcome=fail && preferred_label=Experiment
  extensions:
    loop_restart: false
- from: review_findings
  to: synthesize
  label: Fix Findings
  condition: outcome=fail
  extensions:
    loop_restart: false
- from: synthesize
  to: review_findings
- from: review_findings
  to: commit_findings
- from: commit_findings
  to: done
