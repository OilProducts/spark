<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generic MySQL CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="max-w-6xl mx-auto py-10 px-6">
      <header class="mb-8">
        <h1 class="text-3xl font-semibold mb-2">MySQL CRUD Explorer</h1>
        <p class="text-slate-600">Connect to any MySQL table, inspect schema, and manage rows.</p>
        <p id="status" class="text-sm text-slate-600 mt-2">Ready.</p>
      </header>

      <section class="bg-white border rounded-lg shadow-sm p-6 mb-8">
        <div class="flex flex-col gap-4 md:flex-row md:items-end">
          <label class="w-full">
            <span class="text-sm font-medium text-slate-700">Select table</span>
            <select
              id="tableSelect"
              class="mt-1 block w-full border rounded-md px-3 py-2 focus:border-blue-600 focus:ring-1 focus:ring-blue-200"
            ></select>
          </label>
          <button
            id="refreshBtn"
            class="inline-flex justify-center rounded-md bg-blue-600 px-4 py-2 text-white font-medium hover:bg-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-400"
            type="button"
          >
            Refresh
          </button>
        </div>
        <div id="schema" class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6"></div>
      </section>

      <section class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="bg-white border rounded-lg shadow-sm p-6 lg:col-span-2">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold">Rows</h2>
          </div>
          <div class="flex flex-wrap gap-4 items-end mb-4">
            <label class="w-32">
              <span class="text-xs uppercase text-slate-500">Limit</span>
              <input
                id="limitInput"
                type="number"
                min="1"
                max="200"
                value="50"
                class="mt-1 block w-full border rounded-md px-3 py-2 focus:border-blue-600 focus:ring-1 focus:ring-blue-200"
              />
            </label>
            <label class="w-32">
              <span class="text-xs uppercase text-slate-500">Offset</span>
              <input
                id="offsetInput"
                type="number"
                min="0"
                value="0"
                class="mt-1 block w-full border rounded-md px-3 py-2 focus:border-blue-600 focus:ring-1 focus:ring-blue-200"
              />
            </label>
            <label class="flex-1 min-w-[150px]">
              <span class="text-xs uppercase text-slate-500">Order By</span>
              <input
                id="orderInput"
                type="text"
                placeholder="column or -column"
                class="mt-1 block w-full border rounded-md px-3 py-2 focus:border-blue-600 focus:ring-1 focus:ring-blue-200"
              />
            </label>
            <button
              id="applyFilters"
              type="button"
              class="h-10 px-4 rounded-md bg-slate-900 text-white font-medium hover:bg-slate-800 focus:ring-2 focus:ring-slate-500"
            >
              Apply
            </button>
          </div>
          <div class="overflow-x-auto">
            <table class="min-w-full text-sm">
              <thead>
                <tr id="columnHeaders"></tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>

        <div class="bg-white border rounded-lg shadow-sm p-6">
          <h2 class="text-xl font-semibold mb-4">Create / Update</h2>
          <form id="rowForm" class="space-y-4"></form>
          <div class="flex gap-3 mt-4">
            <button
              id="createBtn"
              type="button"
              class="flex-1 rounded-md bg-green-600 px-4 py-2 text-white font-medium hover:bg-green-500"
            >
              Create
            </button>
            <button
              id="updateBtn"
              type="button"
              class="flex-1 rounded-md bg-amber-600 px-4 py-2 text-white font-medium hover:bg-amber-500"
            >
              Update by PK
            </button>
          </div>
          <div class="mt-4">
            <label class="block text-sm font-medium">Primary key value</label>
            <input
              type="text"
              id="pkInput"
              class="mt-1 block w-full border rounded-md px-3 py-2 focus:border-blue-600 focus:ring-1 focus:ring-blue-200"
            />
            <button
              id="deleteBtn"
              type="button"
              class="mt-3 w-full rounded-md bg-red-600 px-4 py-2 text-white font-medium hover:bg-red-500"
            >
              Delete by PK
            </button>
          </div>
        </div>
      </section>
    </div>

    <script src="/static/app.js" type="module"></script>
  </body>
</html>
